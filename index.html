
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estoques - CTM</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/HL8VuTM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: #0F172A; /* Slate 900 */
        --color-accent: #3B82F6; /* Blue 500 */
        --color-bg: #F1F5F9; /* Slate 100 */
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-bg: rgba(255, 255, 255, 0.7);
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--color-bg);
        color: var(--color-primary);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      
      /* Scrollbar Minimalista */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94A3B8;
      }
      
      /* Glass Effect Premium */
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
      }

      .glass-heavy {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid #FFF;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      }
      
      /* Animações Suaves */
      .animate-fade-in {
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      .animate-slide-up {
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Animated Gradient Blobs - Mais sutis */
      .blob-cont {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.5;
        animation: moveBlob 25s infinite alternate ease-in-out;
      }
      .blob-1 { top: -20%; left: -20%; width: 60vw; height: 60vw; background: #DBEAFE; } /* Blue 100 */
      .blob-2 { bottom: -20%; right: -20%; width: 70vw; height: 70vw; background: #E0E7FF; animation-duration: 30s; } /* Indigo 100 */
      .blob-3 { top: 30%; left: 30%; width: 40vw; height: 40vw; background: #F3E8FF; animation-duration: 35s; } /* Purple 100 */

      @keyframes moveBlob {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(40px, 40px) scale(1.05); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",

    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "html5-qrcode": "https://esm.sh/html5-qrcode@^2.3.8",
    "qrcode": "https://esm.sh/qrcode@^1.5.4",
    "jspdf": "https://esm.sh/jspdf@^2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@^3.8.1",
    "firebase-admin": "https://esm.sh/firebase-admin@^13.6.1",
    "firebase-functions": "https://esm.sh/firebase-functions@^7.0.5",
    "xlsx": "https://esm.sh/xlsx@^0.18.5",
    "papaparse": "https://esm.sh/papaparse@^5.4.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- Background Decoration -->
    <div class="blob-cont">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

</html>
